<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xiao Yue Xiao Chi - Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; padding-bottom: 80px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .qty-btn.minus { background-color: #fef2f2; color: #ef4444; border: 1px solid #fca5a5; }
        .qty-btn.plus { background-color: #f0fdf4; color: #22c55e; border: 1px solid #86efac; }
    </style>
</head>
<body class="font-sans antialiased text-gray-800">

    <div class="w-full bg-white shadow-sm p-4 sticky top-0 z-10">
        <h2 class="text-xl font-bold text-center text-red-600">小月小吃 (Xiao Yue Xiao Chi)</h2>
    </div>

    <div class="p-4 grid grid-cols-2 gap-4" id="menu-container">
        <!-- Items will be injected here -->
        <p class="col-span-2 text-center text-gray-500 py-10">កំពុងទាញយកម៉ឺនុយ (Loading)...</p>
    </div>

    <!-- Bottom Floating Cart -->
    <div class="fixed bottom-0 w-full bg-white border-t border-gray-200 p-4 shadow-lg flex justify-between items-center" id="cart-bar" style="display: none;">
        <div>
            <p class="text-sm text-gray-500">សរុប (Total)</p>
            <p class="text-lg font-bold text-red-600" id="cart-total">$0.00</p>
        </div>
        <button onclick="checkout()" class="bg-red-600 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-red-700 transition">
            បញ្ជាទិញ (Order)
        </button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let menuData = [];
        let cart = {};

        // Fetch Menu from Backend
        async function fetchMenu() {
            try {
                let res = await fetch('/api/menu');
                menuData = await res.json();
                renderMenu();
            } catch (error) {
                document.getElementById('menu-container').innerHTML = `<p class="col-span-2 text-center text-red-500">❌ Error loading menu.</p>`;
            }
        }

        function updateCartUI() {
            let total = 0;
            let itemCount = 0;

            menuData.forEach(item => {
                let qty = cart[item.id] || 0;
                if (qty > 0) {
                    total += item.price * qty;
                    itemCount += qty;
                }
                
                let qtySpan = document.getElementById(`qty-${item.id}`);
                if (qtySpan) qtySpan.innerText = qty;
            });

            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('cart-bar').style.display = itemCount > 0 ? 'flex' : 'none';
        }

        function changeQty(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] < 0) cart[id] = 0;
            updateCartUI();
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            menuData.forEach(item => {
                const imgUrl = item.image_url ? item.image_url : 'https://via.placeholder.com/150?text=Food';
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col";
                
                card.innerHTML = `
                    <div class="h-32 w-full bg-cover bg-center" style="background-image: url('${imgUrl}');"></div>
                    <div class="p-3 flex flex-col flex-grow justify-between">
                        <h3 class="font-bold text-sm leading-tight text-gray-800">${item.name}</h3>
                        <p class="text-red-600 font-semibold mt-1">$${item.price.toFixed(2)}</p>
                        
                        <div class="flex items-center justify-between mt-3">
                            <button class="qty-btn minus" onclick="changeQty(${item.id}, -1)">-</button>
                            <span class="font-bold" id="qty-${item.id}">0</span>
                            <button class="qty-btn plus" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function checkout() {
            let orderItems = [];
            let total = 0;

            menuData.forEach(item => {
                let qty = cart[item.id] || 0;
                if (qty > 0) {
                    orderItems.push(`${item.name} x${qty}`);
                    total += item.price * qty;
                }
            });

            if (orderItems.length === 0) return;

            let customerName = tg.initDataUnsafe?.user?.first_name || "ភ្ញៀវ (Guest)";
            let chatId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "";

            let payload = {
                customer: customerName,
                items: orderItems.join(", "),
                total: `$${total.toFixed(2)}`,
                chat_id: chatId,
                redeem_points: 0
            };

            tg.MainButton.text = "កំពុងបញ្ជូន... (Processing)";
            tg.MainButton.show();
            tg.MainButton.showProgress();

            try {
                let res = await fetch('/api/miniapp/checkout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    tg.close(); // បិទ Mini App ពេលជោគជ័យ
                }
            } catch (err) {
                alert("មានបញ្ហាក្នុងការភ្ជាប់ទៅកាន់ប្រព័ន្ធ!");
                tg.MainButton.hideProgress();
            }
        }

        fetchMenu();
    </script>
</body>
</html>
