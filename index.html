<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xiao Yue Xiao Chi - Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; padding-bottom: 80px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .qty-btn.minus { background-color: #fef2f2; color: #ef4444; border: 1px solid #fca5a5; }
        .qty-btn.plus { background-color: #f0fdf4; color: #22c55e; border: 1px solid #86efac; }
    </style>
</head>
<body class="font-sans antialiased text-gray-800">

    <div class="w-full bg-white shadow-sm p-4 sticky top-0 z-10">
        <h2 class="text-xl font-bold text-center text-red-600">小月小吃 (Xiao Yue Xiao Chi)</h2>
    </div>

    <div class="p-4 grid grid-cols-2 gap-4" id="menu-container">
        <!-- Items will be injected here -->
        <p class="col-span-2 text-center text-gray-500 py-10">កំពុងទាញយកម៉ឺនុយ (Loading)...</p>
    </div>

    <!-- Bottom Floating Cart -->
    <div class="fixed bottom-0 w-full bg-white border-t border-gray-200 p-4 shadow-lg flex justify-between items-center" id="cart-bar" style="display: none;">
        <div class="w-full text-center">
            <p class="text-sm text-gray-500" id="cart-lbl">សរុប (Total)</p>
            <p class="text-xl font-bold text-red-600" id="cart-total">$0.00</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let menuData = [];
        let cart = {};

        // --- Localization ---
        const translations = {
            km: {
                loading: "កំពុងទាញយកម៉ឺនុយ...",
                error_loading: "❌ មានបញ្ហាក្នុងការទាញយកម៉ឺនុយ។",
                total: "សរុប",
                order: "បញ្ជាទិញ",
                processing: "កំពុងបញ្ជូន...",
                error_connecting: "មានបញ្ហាក្នុងការភ្ជាប់ទៅកាន់ប្រព័ន្ធ!",
            },
            en: {
                loading: "Loading menu...",
                error_loading: "❌ Error loading menu.",
                total: "Total",
                order: "Order",
                processing: "Processing...",
                error_connecting: "Error connecting to the system!",
            },
            zh: {
                loading: "正在加载菜单...",
                error_loading: "❌ 菜单加载失败。",
                total: "总计",
                order: "下单",
                processing: "处理中...",
                error_connecting: "系统连接失败！",
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        let lang = urlParams.get('lang') || 'km';
        let t = (key) => translations[lang]?.[key] || translations['km'][key];

        // --- Smart Language Synchronization 100% ---
        async function initializeApp() {
            const chatId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "";
            if (chatId) {
                try {
                    const userRes = await fetch(`/api/users/${chatId}`);
                    if (userRes.ok) {
                        const userData = await userRes.json();
                        if (userData && userData.language) {
                            lang = userData.language;
                            t = (key) => translations[lang]?.[key] || translations['km'][key];
                        }
                    }
                } catch(e) {}
            }
            document.getElementById('menu-container').innerHTML = `<p class="col-span-2 text-center text-gray-500 py-10">${t('loading')}</p>`;
            document.getElementById('cart-lbl').innerText = t('total');
            fetchMenu();
        }

        // --- Smart Localization for Item Names ---
        function getLocalizedText(text, lang) {
            if (!text) return "";
            if (text.includes('|')) { // Format: ខ្មែរ|中文|English
                const parts = text.split('|');
                if (lang === 'km' && parts.length > 0) return parts[0].trim();
                if (lang === 'zh' && parts.length > 1) return parts[1].trim();
                if (lang === 'en' && parts.length > 2) return parts[2].trim();
                return parts[0].trim();
            }
            const match = text.match(/^(.*?)\s*\((.*?)\)$/); // Format: ខ្មែរ (English)
            if (match) return lang === 'km' ? match[1].trim() : match[2].trim();
            return text;
        }

        // Fetch Menu from Backend
        async function fetchMenu() {
            try {
                const res = await fetch('/api/menu');
                menuData = await res.json();
                renderMenu();
            } catch (error) {
                document.getElementById('menu-container').innerHTML = `<p class="col-span-2 text-center text-red-500">${t('error_loading')}</p>`;
            }
        }

        tg.MainButton.onClick(checkout);

        function updateCartUI() {
            let total = 0;
            let itemCount = 0;
            menuData.forEach(item => {
                let qty = cart[item.id] || 0;
                if (qty > 0) {
                    total += item.price * qty;
                    itemCount += qty;
                }
                
                const qtySpan = document.getElementById(`qty-${item.id}`);
                if (qtySpan) qtySpan.innerText = qty;
            });

            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            if (itemCount > 0) {
                document.getElementById('cart-bar').style.display = 'flex';
                tg.MainButton.text = `${t('order')} - $${total.toFixed(2)}`;
                tg.MainButton.show();
            } else {
                document.getElementById('cart-bar').style.display = 'none';
                tg.MainButton.hide();
            }
        }

        function changeQty(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] < 0) cart[id] = 0;
            updateCartUI();
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            menuData.forEach(item => {
                const imgUrl = item.image_url ? item.image_url : 'https://via.placeholder.com/150?text=Food';
                const card = document.createElement('div');
                const locName = getLocalizedText(item.name, lang);
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col";
                
                card.innerHTML = `
                    <div class="h-32 w-full bg-cover bg-center" style="background-image: url('${imgUrl}');"></div>
                    <div class="p-3 flex flex-col flex-grow justify-between">
                        <h3 class="font-bold text-sm leading-tight text-gray-800">${locName}</h3>
                        <p class="text-red-600 font-semibold mt-1">$${item.price.toFixed(2)}</p>
                        
                        <div class="flex items-center justify-between mt-3">
                            <button class="qty-btn minus" onclick="changeQty(${item.id}, -1)">-</button>
                            <span class="font-bold" id="qty-${item.id}">0</span>
                            <button class="qty-btn plus" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function checkout() {
            let orderItems = [];
            let total = 0;

            menuData.forEach(item => {
                let qty = cart[item.id] || 0;
                if (qty > 0) {
                    const locName = getLocalizedText(item.name, lang);
                    const itemTotal = item.price * qty;
                    orderItems.push(`${locName} x${qty} = $${itemTotal.toFixed(2)}`);
                    total += itemTotal;
                }
            });

            if (orderItems.length === 0) return;

            const customerName = tg.initDataUnsafe?.user?.first_name || "ភ្ញៀវ (Guest)";
            const chatId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "";

            const payload = {
                customer: customerName,
                items: orderItems.join("\n"),
                total: `$${total.toFixed(2)}`,
                chat_id: chatId,
                redeem_points: 0
            };

            tg.MainButton.text = t('processing');
            tg.MainButton.showProgress();

            try {
                const res = await fetch('/api/miniapp/checkout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    tg.close();
                }
            } catch (err) {
                alert(t('error_connecting'));
                tg.MainButton.hideProgress();
                updateCartUI(); // Reset button UI
            }
        }

        initializeApp();
    </script>
</body>
</html>
